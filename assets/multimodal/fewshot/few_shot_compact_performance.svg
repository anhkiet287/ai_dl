<svg width="1200" height="620" viewBox="0 0 1200 620" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Few-shot performance chart</title>
  <desc id="desc">Compact dark-theme grouped bar chart comparing few-shot methods by test accuracy and macro-F1.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="620" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accGrad" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#6EA8FE"/>
      <stop offset="1" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="f1Grad" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#7EF0C2"/>
      <stop offset="1" stop-color="#10B981"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1200" height="620" rx="28" fill="url(#bg)"/>
  <rect x="24" y="24" width="1152" height="572" rx="24" fill="#111827" stroke="#243041"/>

  <text x="70" y="84" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">Few-shot Performance Comparison</text>
  <text x="70" y="114" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="16">Test-set Accuracy and Macro-F1 for the 4 few-shot methods</text>

  <g transform="translate(760,60)">
    <rect x="0" y="0" width="18" height="18" rx="5" fill="url(#accGrad)"/>
    <text x="28" y="14" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="15">Accuracy</text>
    <rect x="120" y="0" width="18" height="18" rx="5" fill="url(#f1Grad)"/>
    <text x="148" y="14" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="15">Macro-F1</text>
  </g>

  <g transform="translate(70,150)">
    <rect x="0" y="0" width="1060" height="380" rx="18" fill="#0F172A" stroke="#1E293B"/>

    <g stroke="#334155" stroke-width="1">
      <line x1="70" y1="40" x2="1000" y2="40"/>
      <line x1="70" y1="116" x2="1000" y2="116"/>
      <line x1="70" y1="192" x2="1000" y2="192"/>
      <line x1="70" y1="268" x2="1000" y2="268"/>
      <line x1="70" y1="344" x2="1000" y2="344"/>
    </g>

    <g fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="13" text-anchor="end">
      <text x="58" y="348">0%</text>
      <text x="58" y="272">10%</text>
      <text x="58" y="196">20%</text>
      <text x="58" y="120">30%</text>
      <text x="58" y="44">40%</text>
    </g>

    <line x1="70" y1="344" x2="1000" y2="344" stroke="#475569" stroke-width="1.5"/>

    <!-- Group 1: CE Probe -->
    <g transform="translate(120,0)">
      <rect x="0" y="17.74" width="64" height="326.26" rx="14" fill="url(#accGrad)" filter="url(#softShadow)"/>
      <rect x="76" y="32.74" width="64" height="311.26" rx="14" fill="url(#f1Grad)" filter="url(#softShadow)"/>
      <text x="32" y="8" fill="#DBEAFE" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600" text-anchor="middle">42.94%</text>
      <text x="108" y="23" fill="#D1FAE5" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600" text-anchor="middle">40.94%</text>
      <text x="70" y="374" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600" text-anchor="middle">CE Probe</text>
    </g>

    <!-- Group 2: MLP Probe -->
    <g transform="translate(360,0)">
      <rect x="0" y="19.63" width="64" height="324.37" rx="14" fill="url(#accGrad)" filter="url(#softShadow)"/>
      <rect x="76" y="29.74" width="64" height="314.26" rx="14" fill="url(#f1Grad)" filter="url(#softShadow)"/>
      <text x="32" y="10" fill="#DBEAFE" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600" text-anchor="middle">42.68%</text>
      <text x="108" y="20" fill="#D1FAE5" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600" text-anchor="middle">41.35%</text>
      <text x="70" y="374" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600" text-anchor="middle">MLP Probe</text>
    </g>

    <!-- Group 3: Prompt Adaptation -->
    <g transform="translate(600,0)">
      <rect x="0" y="0" width="64" height="344" rx="14" fill="url(#accGrad)" filter="url(#softShadow)"/>
      <rect x="76" y="16" width="64" height="328" rx="14" fill="url(#f1Grad)" filter="url(#softShadow)"/>
      <text x="32" y="-9" fill="#DBEAFE" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" text-anchor="middle">47.26%</text>
      <text x="108" y="7" fill="#D1FAE5" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" text-anchor="middle">44.96%</text>
      <rect x="-14" y="-34" width="168" height="24" rx="12" fill="#1D4ED8" opacity="0.18"/>
      <text x="70" y="-18" fill="#BFDBFE" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" text-anchor="middle">Best overall</text>
      <text x="70" y="374" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600" text-anchor="middle">Prompt Adaptation</text>
    </g>

    <!-- Group 4: CoOp -->
    <g transform="translate(840,0)">
      <rect x="0" y="13.17" width="64" height="330.83" rx="14" fill="url(#accGrad)" filter="url(#softShadow)"/>
      <rect x="76" y="21.58" width="64" height="322.42" rx="14" fill="url(#f1Grad)" filter="url(#softShadow)"/>
      <text x="32" y="4" fill="#DBEAFE" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600" text-anchor="middle">44.43%</text>
      <text x="108" y="12" fill="#D1FAE5" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600" text-anchor="middle">42.72%</text>
      <text x="70" y="374" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600" text-anchor="middle">CoOp</text>
    </g>
  </g>

  <g transform="translate(70,548)">
    <text x="0" y="0" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="14">Metrics from your notebook (test set): Accuracy and Macro-F1.</text>
  </g>
</svg>
