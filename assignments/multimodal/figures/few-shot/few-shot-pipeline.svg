<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="850" viewBox="0 0 1500 850" role="img" aria-label="Few-shot CLIP Adaptation Pipeline">
  <defs>
    <style>
      :root {
        --bg: #0d1726;
        --card: #111d30;
        --card-border: #264067;
        --muted: #a5b3c8;
        --text: #e8eefb;
        --primary: #7eb4ff;
        --mint: #7ce0c3;
        --accent: #9c8bff;
      }
      text { font-family: "Inter", "Segoe UI", system-ui, -apple-system, sans-serif; fill: var(--text); }
      .title { font-size: 30px; font-weight: 700; }
      .subtitle { font-size: 18px; fill: var(--muted); }
      .label { font-size: 16px; font-weight: 700; }
      .sub { font-size: 13px; fill: var(--muted); }
      .small { font-size: 12px; fill: var(--muted); }
      .card {
        fill: var(--card);
        stroke: var(--card-border);
        stroke-width: 1.6;
        rx: 16; ry: 16;
      }
      .panel {
        fill: var(--card);
        stroke: var(--card-border);
        stroke-width: 1.4;
        rx: 18; ry: 18;
        filter: drop-shadow(0 10px 18px rgba(0,0,0,0.25));
      }
      .panel-header {
        fill: rgba(126,240,194,0.12);
        stroke: rgba(126,240,194,0.35);
        stroke-width: 1.2;
        rx: 12; ry: 12;
      }
      .panel-header-purple {
        fill: rgba(156,139,255,0.12);
        stroke: rgba(156,139,255,0.35);
      }
      .panel-header-blue {
        fill: rgba(126,180,255,0.12);
        stroke: rgba(126,180,255,0.35);
      }
      .badge {
        fill: rgba(126,240,194,0.18);
        stroke: rgba(126,240,194,0.45);
        stroke-width: 1;
        rx: 10; ry: 10;
      }
      .badge-purple {
        fill: rgba(156,139,255,0.18);
        stroke: rgba(156,139,255,0.45);
      }
      .arrow { stroke: var(--primary); stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .arrow-mint { stroke: var(--mint); stroke-width: 2.2; fill: none; marker-end: url(#arrow-mint); }
      .arrow-purple { stroke: var(--accent); stroke-width: 2.2; fill: none; marker-end: url(#arrow-purple); }
      .vec { fill: none; stroke: var(--mint); stroke-width: 2; }
      .tokens rect { fill: none; stroke: var(--accent); stroke-width: 1.8; rx: 6; ry: 6; }
      .table {
        fill: var(--card);
        stroke: var(--card-border);
        stroke-width: 1.4;
        rx: 14; ry: 14;
      }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7eb4ff" />
    </marker>
    <marker id="arrow-mint" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7ce0c3" />
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9c8bff" />
    </marker>
  </defs>

  <rect width="1500" height="850" fill="transparent"/>
  <text x="750" y="60" text-anchor="middle" class="title">Few-shot CLIP Adaptation Pipeline</text>
  <text x="750" y="88" text-anchor="middle" class="subtitle">3 adaptation strategies with 10 labeled samples per class</text>

  <!-- Shared left section -->
  <rect class="card" x="70" y="150" width="220" height="160"/>
  <text x="180" y="185" text-anchor="middle" class="label">Few-shot dataset</text>
  <text x="180" y="205" text-anchor="middle" class="sub">10 labeled samples per class</text>
  <text x="180" y="225" text-anchor="middle" class="small">same train / val / test protocol</text>
  <rect x="115" y="235" width="55" height="40" rx="8" ry="8" stroke="#7eb4ff" stroke-width="2" fill="none"/>
  <rect x="185" y="235" width="55" height="40" rx="8" ry="8" stroke="#7ce0c3" stroke-width="2" fill="none"/>

  <line class="arrow" x1="290" y1="230" x2="380" y2="230"/>

  <rect class="card" x="380" y="140" width="240" height="180"/>
  <text x="500" y="180" text-anchor="middle" class="label">Pretrained CLIP</text>
  <text x="500" y="200" text-anchor="middle" class="sub">image encoder · text encoder</text>
  <rect class="badge" x="430" y="210" width="140" height="30"/>
  <text x="500" y="231" text-anchor="middle" class="small">frozen backbone</text>

  <!-- Branch arrows to 3 approaches -->
  <line class="arrow" x1="620" y1="200" x2="820" y2="200"/>
  <line class="arrow" x1="620" y1="230" x2="820" y2="350"/>
  <line class="arrow" x1="620" y1="260" x2="820" y2="520"/>

  <!-- Approach 1: Linear Classifier -->
  <rect class="panel" x="820" y="130" width="240" height="200"/>
  <rect class="panel-header-blue" x="835" y="145" width="210" height="36" rx="10" ry="10"/>
  <text x="940" y="168" text-anchor="middle" class="label">Approach 1: Linear Classifier</text>
  <text x="940" y="198" text-anchor="middle" class="sub">Train a lightweight head on frozen embeddings.</text>
  <rect class="card" x="855" y="215" width="180" height="32"/>
  <text x="945" y="236" text-anchor="middle" class="small">frozen image features</text>
  <line class="arrow" x1="945" y1="247" x2="945" y2="270"/>
  <rect class="card" x="880" y="270" width="130" height="30"/>
  <text x="945" y="290" text-anchor="middle" class="small">linear layer</text>
  <line class="arrow" x1="945" y1="300" x2="945" y2="323"/>
  <rect class="card" x="880" y="323" width="130" height="30"/>
  <text x="945" y="343" text-anchor="middle" class="small">class logits</text>
  <text x="940" y="365" text-anchor="middle" class="small">supervised loss · low compute</text>

  <!-- Approach 2: Prompt Similarity -->
  <rect class="panel" x="820" y="320" width="240" height="230"/>
  <rect class="panel-header" x="835" y="335" width="210" height="36" rx="10" ry="10"/>
  <text x="940" y="358" text-anchor="middle" class="label">Approach 2: Prompt Similarity</text>
  <text x="940" y="382" text-anchor="middle" class="sub">Adapt prompts + contrastive alignment.</text>
  <rect class="card" x="855" y="400" width="180" height="30"/>
  <text x="945" y="420" text-anchor="middle" class="small">image embedding</text>
  <rect class="card" x="855" y="435" width="180" height="30"/>
  <text x="945" y="455" text-anchor="middle" class="small">learnable prompts</text>
  <line class="arrow-mint" x1="945" y1="465" x2="945" y2="485"/>
  <rect class="card" x="865" y="485" width="160" height="36"/>
  <text x="945" y="508" text-anchor="middle" class="small">cosine similarity</text>
  <text x="945" y="530" text-anchor="middle" class="small">contrastive loss · improved alignment</text>

  <!-- Approach 3: CoOp -->
  <rect class="panel" x="820" y="560" width="240" height="230"/>
  <rect class="panel-header-purple" x="835" y="575" width="210" height="36" rx="10" ry="10"/>
  <text x="940" y="598" text-anchor="middle" class="label">Approach 3: CoOp</text>
  <text x="940" y="622" text-anchor="middle" class="sub">Learn context tokens for prompts.</text>
  <g class="tokens" transform="translate(860,630)">
    <rect x="0" y="0" width="36" height="24" />
    <rect x="44" y="0" width="36" height="24" />
    <rect x="88" y="0" width="36" height="24" />
    <rect x="132" y="0" width="70" height="24" />
  </g>
  <text x="940" y="660" text-anchor="middle" class="small">[v1] [v2] [v3] class_name</text>
  <line class="arrow-purple" x1="940" y1="670" x2="940" y2="690"/>
  <rect class="card" x="870" y="690" width="140" height="32"/>
  <text x="940" y="712" text-anchor="middle" class="small">text encoder</text>
  <line class="arrow-purple" x1="940" y1="722" x2="940" y2="742"/>
  <rect class="card" x="880" y="742" width="120" height="30"/>
  <text x="940" y="762" text-anchor="middle" class="small">similarity</text>
  <text x="940" y="784" text-anchor="middle" class="small">prompt tuning · backbone fixed</text>

  <!-- Dataset to comparison arrows -->
  <line class="arrow" x1="1060" y1="240" x2="1180" y2="240"/>
  <line class="arrow" x1="1060" y1="470" x2="1180" y2="470"/>
  <line class="arrow" x1="1060" y1="700" x2="1180" y2="700"/>

  <!-- Comparison block -->
  <rect class="card" x="1180" y="180" width="260" height="410"/>
  <text x="1310" y="215" text-anchor="middle" class="label">Comparison on test set</text>
  <text x="1310" y="235" text-anchor="middle" class="sub">same backbone · same few-shot split</text>

  <rect class="table" x="1210" y="250" width="200" height="170"/>
  <text x="1310" y="275" text-anchor="middle" class="small" font-weight="700">Accuracy · Macro-F1 · Train cost</text>
  <text x="1230" y="305" class="small">Linear classifier</text>
  <text x="1390" y="305" class="small" text-anchor="end">baseline</text>
  <text x="1230" y="330" class="small">Prompt similarity</text>
  <text x="1390" y="330" class="small" text-anchor="end">best</text>
  <text x="1230" y="355" class="small">CoOp</text>
  <text x="1390" y="355" class="small" text-anchor="end">prompt tuned</text>

  <rect class="badge" x="1230" y="390" width="160" height="32"/>
  <text x="1310" y="412" text-anchor="middle" class="small" font-weight="700">Best few-shot: Prompt Adaptation</text>

  <!-- Bottom notes -->
  <text x="750" y="820" text-anchor="middle" class="sub">All methods start from the same pretrained CLIP model and the same few-shot split. They differ only in how adaptation is performed.</text>
  <text x="750" y="842" text-anchor="middle" class="sub">Few-shot learning improves over zero-shot by adding a small amount of labeled supervision.</text>
</svg>
